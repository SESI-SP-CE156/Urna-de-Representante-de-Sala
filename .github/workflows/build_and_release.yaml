name: Build & Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  # ===================================================
  # JOB 1: BUILD (Roda em paralelo para Linux e Windows)
  # ===================================================
  build:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # --- LINUX STEPS ---
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsqlite3-dev libfuse2 imagemagick libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install Project Dependencies
        run: flutter pub get

      - name: Update pubspec.yaml version
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            powershell -Command "(Get-Content pubspec.yaml) -replace '^version: .*', 'version: 1.0.${{ github.run_number }}' | Set-Content pubspec.yaml"
          else
            sed -i 's/^version: .*/version: 1.0.${{ github.run_number }}/g' pubspec.yaml
          fi

      - name: Run Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      # --- BUILD LINUX ---
      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: flutter build linux --release

      - name: Create AppImage (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          mkdir -p AppDir/usr/bin
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

          # Cria a pasta de libs e copia o sqlite renomeado
          mkdir -p AppDir/usr/lib
          cp /usr/lib/x86_64-linux-gnu/libsqlite3.so.0 AppDir/usr/lib/libsqlite3.so

          # Padronizar nome do executável
          if [ -f "AppDir/usr/bin/Urna" ]; then
            mv AppDir/usr/bin/Urna AppDir/usr/bin/urna
          fi

          cat > urna.desktop <<EOF
          [Desktop Entry]
          Name=Urna Eletrônica
          Exec=urna
          Icon=urna
          Type=Application
          Categories=Utility;
          EOF

          if [ -f "linux/runner/resources/application_icon.png" ]; then
            cp linux/runner/resources/application_icon.png urna.png
          else
            wget -q -O urna.png https://storage.googleapis.com/cms-storage-bucket/0dbfcc7a59cd1cf16282.png
          fi

          # Redimensionar ícone
          convert urna.png -resize 256x256! urna.png

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/urna \
            --desktop-file urna.desktop \
            --icon-file urna.png \
            --output appimage

          mv Urna_Eletrônica*.AppImage urna-v1.0.${{ github.run_number }}-x86_64.AppImage

      # --- UPLOAD LINUX ARTIFACT ---
      # Em vez de criar release, salvamos o arquivo para o próximo job
      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: urna-v1.0.${{ github.run_number }}-x86_64.AppImage
          compression-level: 0 # Já está comprimido

      # --- BUILD WINDOWS ---
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: flutter build windows --release

      - name: Build iss script
        if: matrix.os == 'windows-latest'
        run: dart run inno_bundle:build --no-app --release --no-installer

      - name: Output config into github output
        if: matrix.os == 'windows-latest'
        id: envs
        # thanks to https://github.com/actions/runner/issues/2224#issuecomment-1289925992
        run: echo $(dart run inno_bundle:build --envs --no-hf) | Out-File -FilePath $Env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build installer
        if: matrix.os == 'windows-latest'
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: ./build/windows/x64/installer/Release/inno-script.iss

      - name: Prepare Windows Artifacts
        if: matrix.os == 'windows-latest'
        run: |
          # Utiliza curinga (*.exe) para capturar o instalador independentemente do nome padrão do inno_bundle
          # e padroniza o nome do arquivo na raiz do repositório
          Move-Item -Path "build\windows\x64\installer\Release\*.exe" -Destination "urna-v1.0.${{ github.run_number }}-windows-x86_64.exe"

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            urna-v1.0.${{ github.run_number }}-windows-x86_64.exe
            urna-v1.0.${{ github.run_number }}-windows-x86_64.zip

  # ===================================================
  # JOB 2: RELEASE (Roda APÓS os builds terminarem)
  # ===================================================
  release:
    needs: build # Aguarda o job 'build' terminar (ambos OS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Baixa TODOS os artefatos gerados no job anterior
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-build" # Baixa linux-build e windows-build
          merge-multiple: true # Coloca todos os arquivos na raiz da pasta

      # 2. Gera a Descrição e Tag baseada no evento
      - name: Generate Release Details
        id: details
        run: |
          # Define Tag e Nome
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "release_tag=v0.1.0-${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "release_name=Release v0.1.0 (Build ${{ github.run_number }})" >> $GITHUB_OUTPUT
          else
            echo "release_tag=dev-build-${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "release_name=Development Build ${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

          # Gera o Corpo da Release (Descrição) em um arquivo
          echo "### 📦 Detalhes da Versão" > release_body.md
          echo "" >> release_body.md

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "🚀 **Origem: Pull Request #${{ github.event.pull_request.number }}**" >> release_body.md
            echo "**Título:** ${{ github.event.pull_request.title }}" >> release_body.md
            echo "" >> release_body.md
            echo "📝 **Descrição do PR:**" >> release_body.md
            echo "${{ github.event.pull_request.body }}" >> release_body.md
          else
            echo "🛠 **Origem: Commit na Branch ${{ github.ref_name }}**" >> release_body.md
            echo "**Commit Hash:** ${{ github.sha }}" >> release_body.md
            echo "" >> release_body.md
            echo "📝 **Mensagem do Commit:**" >> release_body.md
            echo "${{ github.event.head_commit.message }}" >> release_body.md
          fi

      # 3. Publica a Release Única com os arquivos
      - name: Publish Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          tag: ${{ steps.details.outputs.release_tag }}
          name: ${{ steps.details.outputs.release_name }}
          bodyFile: release_body.md
          prerelease: ${{ steps.details.outputs.is_prerelease }}
          artifacts: "urna-v1.0.${{ github.run_number }}-x86_64.AppImage,urna-v1.0.${{ github.run_number }}-windows-x86_64.exe"
          token: ${{ secrets.GITHUB_TOKEN }}
